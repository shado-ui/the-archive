name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Release APK
        run: |
          # We disable Jetifier via CLI flags or read from gradle.properties
          flutter build apk --release --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: krisha-archive-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Build Windows Application
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Enable Windows Desktop Build
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows Executable
        run: |
          flutter build windows --release --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Compress Build files
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath build\krisha-archive-windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: krisha-archive-windows-zip
          path: build/krisha-archive-windows.zip

  build-ios:
    name: Build iOS / iPadOS Application
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Regenerate iOS Platform Templates
        run: flutter create --project-name=krisha_archive --platforms=ios .

      - name: Build iOS Application (Unsigned)
        run: |
          # iOS/iPad builds on CI are built without code signing first
          flutter build ios --release --no-codesign --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Package IPA
             - name: Create release directory and copy IPA
        run: |
          mkdir -p release
          cp build/krisha-archive-ios.ipa release/krisha-archive-ios-$(date +%Y%m%d-%H%M%S).ipa

      - name: Commit release to repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add release/
          git commit -m "chore: add iOS IPA release - $(date)" || echo "No changes to commit"
          git push origin main || echo "Failed to push"

      - name: Upload iOS/iPadOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: krisha-archive-ios-ipa
          path: build/krisha-archive-ios.ipa
