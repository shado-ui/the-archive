name: Build and Release iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: latest
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS IPA
        run: |
          flutter build ios --release --no-codesign
          mkdir -p build/ios/ipa
          cd build/ios/build/Release-iphoneos
          mkdir -p Payload
          mv Runner.app Payload/
          zip -r -q ../../ipa/app.ipa Payload
          cd ../../../../..

      - name: Create release directory
        run: mkdir -p release

      - name: Copy IPA to release
        run: cp build/ios/ipa/app.ipa release/app-$(date +%Y%m%d-%H%M%S).ipa

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: release/*.ipa

      - name: Commit and push to release branch
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add release/
          git commit -m "Add iOS IPA release - $(date)" || true
          git push origin workflow-ios-release || true
